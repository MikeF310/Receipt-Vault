name: Continuous Delivery Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Receipt_Upload
          push: true
          tags: ${{ format('{0}/receipt-frontend:latest', secrets.DOCKER_HUB_USERNAME) }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ format('{0}/receipt-backend-private:latest', secrets.DOCKER_HUB_USERNAME) }}

      - name: Fetch EC2 IP
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=receipt-vault-app-server" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)

          if [ "$EC2_IP" = "None" ] || [ -z "$EC2_IP" ]; then
            echo "EC2 is not running — skipping deployment. Images have been pushed to Docker Hub and will be pulled on next startup."
            echo "EC2_RUNNING=false" >> $GITHUB_ENV
            else
              echo "Found EC2 at $EC2_IP"
              echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV
              echo "EC2_RUNNING=true" >> $GITHUB_ENV
            fi
        

        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      # - name: Update IONOS DNS A Record, this will dynamically change the IONOS DNS to point to the new EC2 IP.
      #   if: env.EC2_RUNNING == 'true'
      #   run: |
      #     curl -X PATCH "https://api.hosting.ionos.com/dns/v1/zones/${{ secrets.IONOS_ZONE_ID }}/records/${{ secrets.IONOS_RECORD_ID }}" \
      #       -H "X-API-Key: ${{ secrets.IONOS_PREFIX }}.${{ secrets.IONOS_SECRET }}" \
      #       -H "Content-Type: application/json" \
      #       -d "[{
      #         \"name\": \"${{ secrets.DOMAIN_NAME }}\",
      #         \"type\": \"A\",
      #         \"content\": \"${{ env.EC2_IP }}\",
      #         \"ttl\": 60,
      #         \"disabled\": false
      #       }]"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/Receipt-Vault
            git pull
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans